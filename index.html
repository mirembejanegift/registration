<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./regestration.css" />
  </head>
  <body>
    <!-- <div class="row">
    <div class="col-4">col-8</div>
    <div class="col-8">col-4</div>
  </div> -->
    <section class="contianer">
      <div class="head">
        <h1>Nyondo Stock!</h1>
        <h2>Stock Registration Form</h2>
        <h5>Register your company's stock with our exchange</h5>
      </div>
      <div>
        <h3>Company Information</h3>
        <div class="row my-3">
          <div class="col">
            <label for="company name">Company Name*</label>
            <input
              type="text"
              class="form-control"
              placeholder="eg,Bright Corporation"
              aria-label="Bright Corporation"
            />
          </div>

          <div class="col">
            <label for="Company Registration Number"
              >Company Registration Number*</label
            >
            <input
              type="text"
              class="form-control"
              placeholder="eg,RC12345"
              aria-label="eg,RC12345"
            />
          </div>
        </div>
        <div class="row mb-3">
          <div class="col">
            <label for="Chief Executive Officer"
              >Chief Executive Officer*</label
            >
            <input
              type="text"
              class="form-control"
              placeholder="e.g.,John Doe"
              aria-label="John Doe"
            />
          </div>
          <div class="col">
            <label for="Headquarters Location">Headquarters Location*</label>
            <input
              type="text"
              class="form-control"
              placeholder="eg.,kampala,Uganda"
              aria-label="ampala,Uganda"
            />
          </div>
        </div>
        <div class="mb-3">
          <label for="company Website" class="form-label"
            >company Website*</label
          >
          <input
            type="url"
            class="form-control"
            id="company Website"
            placeholder="eg.,https://www.example.com"
          />
        </div>
        <div class="mb-3">
          <label for="Company Description" class="form-label"
            >Company Description*</label
          >
          <input
            type="text"
            class="form-control"
            id="Company Description"
            placeholder=""
          />
        </div>
      </div>
      <div>
        <h3>Stock Detail</h3>

        <div class="row my-3">
          <div class="col">
            <label for="Stock Symbol/Ticker">Symbol/Ticker*</label>
            <input
              type="text"
              class="form-control"
              placeholder="eg,ACME"
              aria-label="ACME"
            />
          </div>

          <div class="col">
            <label for="ISIN Code">ISIN Code*</label>
            <input
              type="text"
              class="form-control"
              placeholder="eg,US000000000"
              aria-label="eg,US000000000"
            />
          </div>
        </div>
        <div class="row mb-3">
          <div class="col">
            <label for="Industry Sector">Industry Sector*</label>
            <input
              type="text"
              class="form-control"
              placeholder="eg,C"
              aria-label="Industry Sector"
            />
          </div>

          <div class="col">
            <label for="Stock Exchange">Stock Exchange*</label>
            <input
              type="text"
              class="form-control"
              placeholder="eg,Select exchange"
              aria-label="Select exchange"
            />
          </div>
        </div>
      </div>
      <div>
        <h3>Financial Information</h3>
        <div class="row my-3">
          <div class="col">
            <label for="initial share price">initial Share Price*</label>
            <input
              type="number"
              class="form-control"
              placeholder="eg,500,000"
              aria-label="500,000"
            />
          </div>

          <div class="col">
            <label for="Currency">Currency*</label>
            <input
              type="text"
              class="form-control"
              placeholder="eg,Ug.Shs.500,0000"
              aria-label="shs.500,0000"
            />
          </div>
        </div>
        <div class="row mb-3">
          <div class="col">
            <label for="number of shares to issue"
              >Number of Shares to issue*</label
            >
            <input
              type="text"
              class="form-control"
              placeholder="eg,10000000"
              aria-label="1000000000"
            />
          </div>

          <div class="col">
            <label for="proposed listing date">Proposed Listing Date*</label>
            <input type="date" class="form-control" />
          </div>
        </div>
      </div>
      <div></div>

      <div class="d-grid gap-2 col-6 mx-auto">
        <!-- <button class="btn btn-primary" type="button">Button</button> -->
        <button class="btn btn-primary px-5" type="button">
          Submit for Grading
        </button>
      </div>
      <div class="note">
        <h4>Note:</h4>
        Fields marked with * are required. Upon submission you will receive a
        unique submission ID and grading link for verification
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
